<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Control de Acceso - Pileta QR</title>

  <style>
    :root {
      --bg: #0b1220;
      --border: rgba(255, 255, 255, .12);
      --txt: #e2e8f0;
      --muted: #94a3b8;
      --success: #22c55e;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
    body { 
      margin: 0; 
      background: radial-gradient(1200px 600px at 30% 10%, #1b2a5a 0%, var(--bg) 55%); 
      color: var(--txt); 
      min-height: 100vh; 
    }
    
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 22px; border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,.18); backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 100;
    }
    .badge {
      width: 40px; height: 40px; border-radius: 14px;
      display: grid; place-items: center;
      background: rgba(34,197,94,.15); border: 1px solid rgba(34,197,94,.25);
      font-weight: 900; color: #86efac;
    }
    h1 { margin: 0; font-size: 18px; }
    .btn-nav {
      padding: 10px 16px; border-radius: 12px; border: 0;
      background: rgba(255,255,255,0.08); color: var(--txt);
      font-weight: 700; cursor: pointer; text-decoration: none;
      transition: 0.2s; font-size: 14px;
    }
    .btn-nav:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }

    main { padding: 22px; max-width: 1100px; margin: 0 auto; }
    .grid { display: grid; gap: 20px; margin-top: 10px; }
    @media(min-width: 900px) { .grid { grid-template-columns: 460px 1fr; } }
    
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid var(--border); border-radius: 18px;
      padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }

    #reader { width: 100%; min-height: 280px; border-radius: 14px; overflow: hidden; background: rgba(0,0,0,.2); }

    .controls input, .controls button {
      width: 100%; margin-top: 12px; padding: 14px;
      border-radius: 12px; border: 1px solid var(--border);
      font-size: 16px; transition: all 0.2s;
    }
    .controls input { background: rgba(0,0,0,.3); color: white; outline: none; }
    .controls button { cursor: pointer; font-weight: bold; background: rgba(255,255,255,0.1); color: white; }
    .controls .primary { background: linear-gradient(90deg,#22c55e,#16a34a); color: #05130a; border: none; }

    .result { border-left: 6px solid var(--border); transition: 0.3s; }
    .result.ok { border-left-color: var(--success); background: rgba(34, 197, 94, 0.08); }
    .result.bad { border-left-color: var(--danger); background: rgba(239, 68, 68, 0.08); }

    .rhead { display: flex; gap: 15px; align-items: center; }
    #rIcon { font-size: 48px; }
    #rTitle { font-size: 28px; font-weight: 900; margin: 0; }
    
    .kv { margin-top: 12px; font-size: 18px; }
    .kv b { color: var(--muted); font-weight: 500; margin-right: 8px; }
    .msg-extra { margin-top: 15px; font-style: italic; color: var(--muted); border-top: 1px solid var(--border); padding-top: 10px; }
  </style>
</head>
<body>

  <header>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="badge">QR</div>
      <div>
        <h1>Validar Acceso</h1>
        <div style="font-size:12px; color:var(--muted)">Sistema de Pileta</div>
      </div>
    </div>
    <a href="index.html" class="btn-nav">🏠 Volver al Menú</a>
  </header>

  <main>
    <div class="grid">
      <div class="card">
        <div id="reader"></div>
        <div class="controls">
          <button id="btnStart">📷 Iniciar Cámara</button>
          <button id="btnStop">⏹ Detener</button>
          <hr style="opacity:0.1; margin: 20px 0">
          <input id="manualToken" type="text" placeholder="Token de 6 dígitos">
          <button class="primary" id="btnManual">✔ VALIDAR ACCESO</button>
        </div>
      </div>

      <div id="result" class="card result">
        <div class="rhead">
          <div id="rIcon">⏳</div>
          <div>
            <div id="rTitle">Esperando...</div>
            <div style="color:var(--muted)">Listo para procesar</div>
          </div>
        </div>
        <div id="rInfo"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <script>
    const API_URL = "/validar-qr";
    const resultCard = document.getElementById("result");
    const rIcon = document.getElementById("rIcon");
    const rTitle = document.getElementById("rTitle");
    const rInfo = document.getElementById("rInfo");
    const inputManual = document.getElementById("manualToken");

    let qrScanner = null;
    let lastToken = null;
    let isValidating = false;

    // --- SONIDOS ---
    function playSound(isOk) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        
        osc.type = isOk ? "sine" : "square";
        osc.frequency.setValueAtTime(isOk ? 880 : 110, ctx.currentTime);
        
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (isOk ? 0.5 : 0.8));
        osc.stop(ctx.currentTime + (isOk ? 0.5 : 0.8));
    }

    function updateUI(state, title, html) {
      resultCard.className = "card result " + (state === "ok" ? "ok" : (state === "bad" ? "bad" : ""));
      rIcon.textContent = state === "ok" ? "✅" : (state === "bad" ? "❌" : "⏳");
      rTitle.textContent = title;
      rInfo.innerHTML = html || "";
    }

    async function validarAcceso(textoLeido, esManual = false) {
      const tokenMatch = textoLeido.match(/\d{6}/);
      const token = tokenMatch ? tokenMatch[0] : "";

      if (!token) return;
      if (token === lastToken && !esManual) return;
      if (isValidating) return;

      isValidating = true;
      lastToken = token;
      updateUI("idle", "VALIDANDO...", `Consultando socio: <b>${token}</b>`);

      try {
        const response = await fetch(`${API_URL}?token=${token}&_t=${Date.now()}`);
        const data = await response.json();
        
        const estado = String(data.resultado || "").toUpperCase().trim();
        const esValido = (estado === "OK");

        playSound(esValido);

        const titulos = { "OK": "HABILITADO", "VENCIDO": "VENCIDO", "ANULADO": "ANULADO" };

        updateUI(
          esValido ? "ok" : "bad",
          (esValido ? "✅ " : "❌ ") + (titulos[estado] || `ESTADO: ${estado}`),
          `<div class="kv"><b>Socio:</b> ${data.nombre || 'Sin nombre'}</div>
           <div class="kv"><b>Vence:</b> ${data.vencimiento || 'No indica'}</div>
           <div class="msg-extra">${data.detalle || ''}</div>`
        );

        // Auto-limpieza a los 5 segundos
        setTimeout(() => {
            updateUI("idle", "Esperando...", "Listo para procesar");
            lastToken = null;
        }, 5000);

      } catch (err) {
        updateUI("bad", "ERROR", "Falla de red.");
        lastToken = null;
      } finally {
        isValidating = false;
      }
    }

    document.getElementById("btnStart").onclick = async () => {
      if (!qrScanner) qrScanner = new Html5Qrcode("reader");
      await qrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (t) => validarAcceso(t));
    };

    document.getElementById("btnStop").onclick = async () => {
      if (qrScanner) await qrScanner.stop();
    };

    document.getElementById("btnManual").onclick = () => validarAcceso(inputManual.value, true);
  </script>
</body>
</html>
