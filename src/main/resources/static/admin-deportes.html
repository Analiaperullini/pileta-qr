<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Configuración de Deportes - TodoFutbol & Voley</title>
  <style>
    :root {
      --bg: #0b1220;
      --card-bg: rgba(255,255,255,.05);
      --txt: #e2e8f0;
      --muted: #94a3b8;
      --accent: #22c55e;
      --border: rgba(255,255,255,.10);
    }
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
    body {
      margin: 0; min-height: 100vh; color: var(--txt);
      background: radial-gradient(1200px 600px at 30% 10%, #1b2a5a 0%, var(--bg) 55%);
      padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    
    .card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 24px; backdrop-filter: blur(10px);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; align-items: end; }
    .field { display: grid; gap: 8px; }
    .label { color: var(--muted); font-size: 13px; font-weight: 600; }
    
    input {
      padding: 12px; border-radius: 12px; border: 1px solid var(--border);
      background: rgba(0,0,0,.3); color: white; outline: none;
    }
    input:focus { border-color: var(--accent); }
    
    .btn-add {
      background: var(--accent); color: #05130a; border: none;
      padding: 12px 24px; border-radius: 12px; font-weight: 800; cursor: pointer;
    }
    .btn-back { background: rgba(255,255,255,0.1); color: white; text-decoration: none; padding: 8px 16px; border-radius: 10px; font-size: 14px; }

    table { width: 100%; margin-top: 30px; border-collapse: collapse; }
    th { text-align: left; color: var(--muted); padding: 12px; border-bottom: 1px solid var(--border); font-size: 12px; text-transform: uppercase; }
    td { padding: 16px 12px; border-bottom: 1px solid var(--border); }
    .cat-badge { background: rgba(34,197,94,0.1); color: #86efac; padding: 4px 10px; border-radius: 8px; font-size: 12px; }
    .btn-del { color: #f87171; background: none; border: none; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <h1 style="margin:0">Configuración de Deportes</h1>
      <div style="color:var(--muted); font-size:13px; margin-top:4px;">CLUB • Panel de Control</div>
    </div>
    <a href="/" class="btn-back">← Volver</a>
  </header>

  <div class="card">
    <div class="form-grid">
      <div class="field">
        <div class="label">Nombre del Deporte</div>
        <input id="nombreDep" placeholder="Ej: Fútbol 11">
      </div>
      <div class="field">
        <div class="label">Categoría / Edad</div>
        <input id="catDep" placeholder="Ej: Sub-17">
      </div>
      <button class="btn-add" onclick="agregarDeporte()">+ Agregar</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Deporte</th>
          <th>Categoría</th>
          <th style="text-align:right">Acciones</th>
        </tr>
      </thead>
      <tbody id="listaDeportes">
        </tbody>
    </table>
  </div>
</div>

<script>
  // Cargar al inicio
  window.onload = listarDeportes;

  async function listarDeportes() {
    try {
      const res = await fetch('/api/deportes');
      const deportes = await res.json();
      const tbody = document.getElementById('listaDeportes');
      
      // Corregimos el "undefined" usando las claves correctas
      tbody.innerHTML = deportes.map(d => `
        <tr>
          <td style="font-weight:700;">${d.nombre || 'Sin nombre'}</td>
          <td><span class="cat-badge">${d.categoria || 'General'}</span></td>
          <td style="text-align:right">
            <button class="btn-del" onclick="eliminarDeporte(${d.id})">Eliminar</button>
          </td>
        </tr>
      `).join('');
    } catch (e) {
      console.error("Error:", e);
    }
  }

  async function agregarDeporte() {
    const nombre = document.getElementById('nombreDep').value;
    const categoria = document.getElementById('catDep').value;

    if (!nombre) return alert("El nombre es obligatorio");

    await fetch('/api/deportes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, categoria })
    });

    document.getElementById('nombreDep').value = '';
    document.getElementById('catDep').value = '';
    listarDeportes();
  }

  async function eliminarDeporte(id) {
    if (!confirm("¿Eliminar este deporte?")) return;
    await fetch(`/api/deportes/${id}`, { method: 'DELETE' });
    listarDeportes();
  }
</script>

</body>
</html>
